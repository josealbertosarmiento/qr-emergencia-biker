<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi QR - QR Emergencia Biker</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="app-body has-bottom-nav">
  <header class="mobile-topbar">
    <div>
      <p class="topbar-label">Código QR</p>
      <h1>Mi QR de emergencia</h1>
    </div>
    <button id="logoutBtn" class="btn btn-danger">Cerrar sesión</button>
  </header>

  <main class="app-shell page-shell page-shell-with-nav">
    <section class="page-card">
      <div class="section-head">
        <div>
          <span class="screen-chip">Acceso rápido</span>
          <h2 class="screen-title">Tu código QR</h2>
          <p class="screen-subtitle">Descárgalo e imprímelo para casco, carnet o moto.</p>
        </div>
      </div>

      <div id="qrCard" class="qr-card clean-qr-card">
        <div class="qr-inner-frame">
          <div id="qrcode"></div>
        </div>
      </div>

      <div class="info-stack">
        <div class="info-item">
          <span class="info-label">ID QR</span>
          <span id="qrIdText" class="info-value">Cargando...</span>
        </div>

        <div class="info-item">
          <span class="info-label">Enlace público</span>
          <span id="qrUrlText" class="info-value url-box">Cargando...</span>
        </div>
      </div>

      <div class="buttons-column section-actions">
        <button id="downloadQrBtn" class="btn">Descargar QR</button>
      </div>

      <p id="qrMessage" class="message"></p>
    </section>
  </main>

  <nav class="bottom-nav">
    <a href="dashboard.html" class="bottom-nav-item">
      <span class="bottom-nav-icon">🏠</span>
      <span class="bottom-nav-label">Inicio</span>
    </a>
    <a href="perfil.html" class="bottom-nav-item">
      <span class="bottom-nav-icon">👤</span>
      <span class="bottom-nav-label">Perfil</span>
    </a>
    <a href="qr.html" class="bottom-nav-item active">
      <span class="bottom-nav-icon">🔳</span>
      <span class="bottom-nav-label">QR</span>
    </a>
  </nav>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script type="module" src="js/auth.js"></script>
  <script type="module" src="js/qr.js"></script>
</body>
</html>
