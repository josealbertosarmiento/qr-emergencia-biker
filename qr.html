<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi QR - QR Emergencia Biker</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="topbar">
    <h1>Mi Código QR</h1>
    <button id="logoutBtn" class="btn btn-danger">Cerrar sesión</button>
  </header>

  <main class="container">
    <div class="card">
      <h2>Tu QR de emergencia</h2>
      <p>Descárgalo e imprímelo. Déjale borde blanco suficiente para que escanee bien.</p>

      <div id="qrCard" class="qr-card clean-qr-card">
        <div class="qr-inner-frame">
          <div id="qrcode"></div>
        </div>
      </div>

      <p><strong>ID QR:</strong> <span id="qrIdText">Cargando...</span></p>
      <p class="small-text"><strong>Enlace público:</strong></p>
      <p id="qrUrlText" class="small-text url-box">Cargando...</p>

      <div class="buttons-column">
        <button id="downloadQrBtn" class="btn">Descargar QR</button>
        <a class="btn btn-secondary" href="dashboard.html">Volver al panel</a>
      </div>

      <p id="qrMessage" class="message"></p>
    </div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script type="module" src="js/auth.js"></script>
  <script type="module" src="js/qr.js"></script>
</body>
</html>
