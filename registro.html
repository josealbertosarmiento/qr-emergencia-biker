<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro - QR Emergencia Biker</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="app-body">
  <main class="app-shell center-shell">
    <section class="auth-card">
      <div class="screen-chip">Registro</div>
      <h2 class="screen-title">Crear cuenta</h2>
      <p class="screen-subtitle">Empieza configurando tu acceso seguro.</p>

      <form id="registerForm">
        <div class="form-group">
          <label for="registerEmail">Correo electrónico</label>
          <input type="email" id="registerEmail" placeholder="correo@ejemplo.com" required />
        </div>

        <div class="form-group">
          <label for="registerPassword">Contraseña</label>
          <input type="password" id="registerPassword" placeholder="Mínimo 6 caracteres" required />
        </div>

        <div class="form-group">
          <label for="registerConfirmPassword">Confirmar contraseña</label>
          <input type="password" id="registerConfirmPassword" placeholder="Repite la contraseña" required />
        </div>

        <button type="submit" class="btn">Registrarme</button>
      </form>

      <p id="registerMessage" class="message"></p>

      <div class="extra-links">
        <a href="login.html">Ya tengo cuenta</a>
      </div>
    </section>
  </main>

  <script type="module" src="js/auth.js"></script>
</body>
</html>
