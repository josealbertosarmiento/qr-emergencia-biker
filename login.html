<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - QR Emergencia Biker</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="app-body">
  <main class="app-shell center-shell">
    <section class="auth-card">
      <div class="screen-chip">Acceso</div>
      <h2 class="screen-title">Iniciar sesión</h2>
      <p class="screen-subtitle">Accede a tu perfil y administra tu QR de emergencia.</p>

      <form id="loginForm">
        <div class="form-group">
          <label for="loginEmail">Correo electrónico</label>
          <input type="email" id="loginEmail" placeholder="correo@ejemplo.com" required />
        </div>

        <div class="form-group">
          <label for="loginPassword">Contraseña</label>
          <input type="password" id="loginPassword" placeholder="••••••••" required />
        </div>

        <button type="submit" class="btn">Entrar</button>
      </form>

      <p id="loginMessage" class="message"></p>

      <div class="extra-links">
        <a href="registro.html">¿Aún no tienes cuenta? Crear cuenta</a>
      </div>
    </section>
  </main>

  <script type="module" src="js/auth.js"></script>
</body>
</html>
