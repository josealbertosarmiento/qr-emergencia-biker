<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard - QR Emergencia Biker</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="app-body">
  <header class="mobile-topbar">
    <div>
      <p class="topbar-label">Panel principal</p>
      <h1>Mi cuenta</h1>
    </div>
    <button id="logoutBtn" class="btn btn-danger">Cerrar sesión</button>
  </header>

  <main class="app-shell page-shell">
    <section class="dashboard-hero">
      <div class="dashboard-hero-content">
        <span class="dashboard-badge">Cuenta activa</span>
        <h2>Bienvenido</h2>
        <p id="userEmail" class="dashboard-email"></p>
        <p>Tu cuenta está lista para gestionar perfil, QR y ficha de emergencia.</p>
      </div>
    </section>

    <section class="dashboard-grid">
      <a class="feature-card" href="perfil.html">
        <div class="feature-icon">👤</div>
        <div>
          <h3>Mi perfil</h3>
          <p>Completa o edita tus datos de emergencia.</p>
        </div>
      </a>

      <a class="feature-card" href="qr.html">
        <div class="feature-icon">🔳</div>
        <div>
          <h3>Mi QR</h3>
          <p>Visualiza, descarga e imprime tu código.</p>
        </div>
      </a>
    </section>
  </main>

  <script type="module" src="js/auth.js"></script>
</body>
</html>
