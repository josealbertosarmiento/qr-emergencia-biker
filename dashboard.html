<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard - QR Emergencia Biker</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="app-body has-bottom-nav">
  <header class="mobile-topbar mobile-topbar-clean">
    <div>
      <p class="topbar-label">Panel principal</p>
      <h1>Mi cuenta</h1>
    </div>
  </header>

  <main class="app-shell page-shell page-shell-with-nav">
    <section class="dashboard-hero">
      <div class="dashboard-hero-content">
        <span class="dashboard-badge">Cuenta activa</span>
        <h2>Bienvenido</h2>
        <p id="userEmail" class="dashboard-email"></p>
        <p>Gestiona tu perfil, genera tu QR y mantén tu ficha lista para cualquier emergencia.</p>
      </div>
    </section>

    <section class="dashboard-grid">
      <a class="feature-card active-feature" href="dashboard.html">
        <div class="feature-icon-svg">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 10.5 12 4l8 6.5V20a1 1 0 0 1-1 1h-4.5v-5h-5v5H5a1 1 0 0 1-1-1z"/>
          </svg>
        </div>
        <div>
          <h3>Inicio</h3>
          <p>Resumen general de tu cuenta.</p>
        </div>
      </a>

      <a class="feature-card" href="perfil.html">
        <div class="feature-icon-svg">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="8" r="4"/>
            <path d="M4.5 20a7.5 7.5 0 0 1 15 0"/>
          </svg>
        </div>
        <div>
          <h3>Mi perfil</h3>
          <p>Completa o edita tus datos de emergencia.</p>
        </div>
      </a>

      <a class="feature-card" href="qr.html">
        <div class="feature-icon-svg">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 4h6v6H4zM14 4h6v6h-6zM4 14h6v6H4z"/>
            <path d="M15 15h2v2h-2zM17 17h3v3h-3zM15 19h2v1h-2zM19 14h1v2h-1z"/>
          </svg>
        </div>
        <div>
          <h3>Mi QR</h3>
          <p>Visualiza, descarga e imprime tu código.</p>
        </div>
      </a>
    </section>
  </main>

  <nav class="bottom-nav bottom-nav-4">
    <a href="dashboard.html" class="bottom-nav-item active">
      <span class="bottom-nav-icon-svg">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M4 10.5 12 4l8 6.5V20a1 1 0 0 1-1 1h-4.5v-5h-5v5H5a1 1 0 0 1-1-1z"/>
        </svg>
      </span>
      <span class="bottom-nav-label">Inicio</span>
    </a>

    <a href="perfil.html" class="bottom-nav-item">
      <span class="bottom-nav-icon-svg">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="8" r="4"/>
          <path d="M4.5 20a7.5 7.5 0 0 1 15 0"/>
        </svg>
      </span>
      <span class="bottom-nav-label">Perfil</span>
    </a>

    <a href="qr.html" class="bottom-nav-item">
      <span class="bottom-nav-icon-svg">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M4 4h6v6H4zM14 4h6v6h-6zM4 14h6v6H4z"/>
          <path d="M15 15h2v2h-2zM17 17h3v3h-3zM15 19h2v1h-2zM19 14h1v2h-1z"/>
        </svg>
      </span>
      <span class="bottom-nav-label">QR</span>
    </a>

    <button id="logoutBtn" class="bottom-nav-item bottom-nav-item-button bottom-nav-item-logout" type="button">
      <span class="bottom-nav-icon-svg">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M10 4H6a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h4"/>
          <path d="M13 8l4 4-4 4"/>
          <path d="M8 12h9"/>
        </svg>
      </span>
      <span class="bottom-nav-label">Salir</span>
    </button>
  </nav>

  <script type="module" src="js/auth.js"></script>
</body>
</html>
